services:
  - type: web
    name: flud-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd flood_model && uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health

  - type: web
    name: flud-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://flud-backend.onrender.com/api/*
